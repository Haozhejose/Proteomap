name: proteomap
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.9
  - pytorch=1.12.1
  - torchvision
  - torchaudio
  - cudatoolkit=11.3  # 如果有GPU，否则移除
  - rdkit=2022.03.2
  - mordred=1.2.0
  - pandas=1.5.3
  - numpy=1.24.3
  - scikit-learn=1.2.2
  - matplotlib=3.6.3
  - tqdm=4.64.1
  - joblib=1.2.0
  - pip
  - pip:
    - torch-geometric  # 如果需要图神经网络扩展